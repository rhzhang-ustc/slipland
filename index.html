<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="description" content="Hop across platforms with physics-driven friction. Ice slides, rubber grips—land right or slip off. Tap to save when you teeter on the edge.">
  <title>Slipland</title>
  <link rel="stylesheet" href="style.css">
  <!-- Google Analytics: replace G-XXXXXXXXXX with your Measurement ID from analytics.google.com -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-F03VWL0JJN"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>
</head>
<body>
  <div id="instructionsOverlay">
    <div class="instructions-stars" aria-hidden="true"></div>
    <div id="instructionsModal">
      <div class="instructions-title-banner">
        <h1>SLIPLAND: Master the Friction!</h1>
      </div>
      <div class="instructions-platforms">
        <div class="platform-card platform-start">
          <div class="platform-bar"></div>
          <span class="platform-label">START</span>
          <p class="platform-desc">Hold &amp; Release to Jump!</p>
        </div>
        <div class="platform-card platform-ice">
          <div class="platform-bar"></div>
          <span class="platform-label">ICE</span>
          <p class="platform-desc">LOW FRICTION!<br><small>(Slide-Off Risk)</small></p>
        </div>
        <div class="platform-card platform-wood">
          <div class="platform-bar"></div>
          <span class="platform-label">WOOD</span>
          <p class="platform-desc">MEDIUM FRICTION</p>
        </div>
        <div class="platform-card platform-sandpaper">
          <div class="platform-bar"></div>
          <span class="platform-label">SANDPAPER</span>
          <p class="platform-desc">HIGH FRICTION!<br><small>(Stick Fast)</small></p>
        </div>
        <div class="platform-card platform-teeter">
          <div class="platform-bar platform-edge"></div>
          <span class="platform-label">TEETER!</span>
          <p class="platform-desc"><strong>Tap to save yourself!</strong></p>
        </div>
        <div class="platform-card platform-plastic">
          <div class="platform-bar"></div>
          <span class="platform-label">PLASTIC</span>
          <p class="platform-desc">VARIED</p>
        </div>
      </div>
      <button id="instructionsPlayBtn">Play</button>
    </div>
  </div>
  <div id="playOverlay" class="hidden">
    <div id="rotateMessage">
      <div id="rotateIcon">📱</div>
      <p>Rotate your phone to play</p>
    </div>
  </div>
  <canvas id="gameCanvas"></canvas>
  <script type="module" src="game.js"></script>
</body>
</html>
